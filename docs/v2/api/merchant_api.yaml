openapi: 3.2.0
$self: https://ownpay.test/docs/v2/api/merchant_api.yaml
info:
  title: OwnPay Merchant API
  summary: Merchant-facing REST API for the OwnPay payment gateway platform.
  description: |
    The **OwnPay Merchant API** provides programmatic access to the core payment gateway
    functionality. Merchants (brands) use this API to initiate payments, query transactions,
    process refunds, manage customers, rotate API credentials, and configure webhooks.

    This specification covers **only** the Merchant API endpoints (`/api/v1/*`).
    Mobile Companion and Admin API endpoints are documented separately.

    ---

    ## Base URL

    All API requests are made to your OwnPay instance domain:

    ```
    https://pay.example.com/api/v1/
    ```

    Replace `pay.example.com` with your configured OwnPay domain. If the brand has a
    custom domain configured, use that domain instead for customer-facing operations.

    ---

    ## Authentication

    All Merchant API endpoints require **Bearer token authentication** using an API key
    generated from the OwnPay admin panel or via the API Keys endpoint.

    Include the API key in the `Authorization` header of every request:

    ```http
    Authorization: Bearer op_abcdefgh.1234567890abcdef1234567890abcdef
    ```

    API keys follow the format `op_{prefix}.{secret}` where:
    - `op_` is a fixed namespace identifier
    - `{prefix}` is an 8-character public identifier (visible in listings)
    - `{secret}` is a 32-character cryptographic secret (shown only at generation time)

    > **Security Note**: API keys are hashed at rest using SHA-256. The full plaintext key
    > is only returned once during generation. Store it securely — it cannot be retrieved again.

    ---

    ## Rate Limiting

    All endpoints are rate-limited to **60 requests per minute** per API key by default.
    Rate limit headers are included in every response:

    | Header | Description |
    |---|---|
    | `X-RateLimit-Limit` | Maximum requests allowed per window |
    | `X-RateLimit-Remaining` | Requests remaining in current window |
    | `X-RateLimit-Reset` | UNIX timestamp when the rate limit window resets |

    When the rate limit is exceeded, the API responds with HTTP `429 Too Many Requests`.

    ---

    ## Idempotency

    For `POST` and `DELETE` requests, the API supports idempotency via the
    `Idempotency-Key` header. Providing this header ensures that retried requests
    (e.g., due to network timeouts) do not create duplicate resources.

    ```http
    Idempotency-Key: unique-request-identifier-here
    ```

    Idempotency keys are valid for 24 hours from the first request.

    ---

    ## Request Format

    - All request bodies must be sent as `application/json`.
    - Character encoding must be UTF-8.
    - Monetary amounts should be sent as numbers or numeric strings with up to 2 decimal places.
    - Currency codes must follow the ISO 4217 standard (3-letter uppercase, e.g., `BDT`, `USD`).

    ---

    ## Response Format

    All responses are returned as `application/json` with UTF-8 encoding.

    ### Success Response Envelope

    ```json
    {
      "success": true,
      "data": { ... },
      "meta": { ... }
    }
    ```

    | Field | Type | Description |
    |---|---|---|
    | `success` | `boolean` | Always `true` for successful responses |
    | `data` | `object \| array` | The response payload (present on most endpoints) |
    | `meta` | `object \| null` | Pagination metadata (present on paginated list endpoints) |

    ### Error Response Envelope

    ```json
    {
      "success": false,
      "error": "Human-readable error summary",
      "errors": [
        {
          "code": "MACHINE_READABLE_CODE",
          "message": "Detailed error description",
          "field": "field_name"
        }
      ],
      "request_id": "a1b2c3d4e5f6..."
    }
    ```

    | Field | Type | Description |
    |---|---|---|
    | `success` | `boolean` | Always `false` for error responses |
    | `error` | `string` | High-level summary of the error |
    | `errors` | `array` | List of structured error objects with codes and field references |
    | `request_id` | `string` | Unique request trace ID for support and debugging |

    ---

    ## Webhook Events

    When payment state changes occur, OwnPay dispatches HMAC-SHA256 signed webhook
    payloads to your configured endpoint. See the [Webhooks](#tag/Webhooks) section
    for testing and delivery log endpoints.

    ### Webhook Payload Structure

    ```json
    {
      "event": "payment.completed",
      "transaction_id": "OP-10482938",
      "amount": "500.00",
      "currency": "BDT",
      "gateway": "bkash",
      "gateway_type": "mobile_wallet",
      "status": "completed",
      "customer": {
        "name": "John Doe",
        "email": "john@example.com",
        "phone": "+8801700000000"
      },
      "metadata": {},
      "timestamp": "2026-05-21T02:45:00+06:00"
    }
    ```

    ### Webhook Signature Verification

    Each webhook delivery includes two custom headers for signature verification:

    | Header | Description |
    |---|---|
    | `X-OwnPay-Signature` | HMAC-SHA256 hex digest of the raw JSON payload |
    | `X-OwnPay-Timestamp` | UNIX timestamp of signature generation |

    To verify the webhook authenticity:

    ```python
    import hmac, hashlib

    expected = hmac.new(
        webhook_secret.encode(),
        raw_body,
        hashlib.sha256
    ).hexdigest()

    is_valid = hmac.compare_digest(expected, received_signature)
    ```

    ---

    ## HTTP Status Codes

    | Code | Meaning |
    |---|---|
    | `200` | Request succeeded |
    | `201` | Resource created successfully |
    | `400` | Bad request — invalid parameters or business rule violation |
    | `401` | Unauthenticated — missing or invalid API key |
    | `404` | Resource not found |
    | `409` | Conflict — duplicate resource |
    | `422` | Validation error — one or more fields failed validation |
    | `429` | Rate limit exceeded |
    | `500` | Internal server error |
    | `503` | Service unavailable or degraded |

  version: 0.1.0
  contact:
    name: OwnPay Developer Support
    url: https://github.com/ownpay/ownpay
