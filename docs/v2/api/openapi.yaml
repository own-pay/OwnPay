          type: integer
          nullable: true
          example: 42
        status:
          type: string
          enum: [accepted, duplicate, rejected, parsed, unparsed, parse_error]
          example: "accepted"
        server_ref:
          type: string
          nullable: true
          example: "sms_abc123"
        error:
          type: string
          nullable: true
          example: null

    BatchSmsUploadResponse:
      type: object
      required: [success, results]
      properties:
        success:
          type: boolean
          example: true
        results:
          type: array
          items:
            $ref: '#/components/schemas/SmsUploadResultItem'

    SmsQueueItem:
      type: object
      required: [id, sender, body, status, created_at]
      properties:
        id:
          type: integer
          example: 1045
        sender:
          type: string
          example: "bKash"
        body:
          type: string
          example: "You have received Tk 500.00 from 01700000000. Ref: pi_xxx."
        status:
          type: string
          enum: [pending, processing, failed, resolved]
          example: "pending"
        created_at:
          type: string
          format: date-time
          example: "2026-05-21T03:00:00+06:00"

    SmsQueueResponse:
      type: object
      required: [success, queue]
      properties:
        success:
          type: boolean
          example: true
        queue:
          type: array
          items:
            $ref: '#/components/schemas/SmsQueueItem'

    ActiveNotification:
      type: object
