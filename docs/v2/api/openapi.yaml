            type: string
          example: ["bKash", "16247", "Nagad", "DBBL"]
        positive_keywords:
          type: array
          items:
            type: string
          example: ["received", "credited", "TrxID", "deposited", "Tk"]
        negative_keywords:
          type: array
          items:
            type: string
