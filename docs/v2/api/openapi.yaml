openapi: 3.2.0
$self: https://ownpay.test/docs/v2/api/openapi.yaml
info:
  title: OwnPay API
  description: |
    Enterprise payment gateway API for OwnPay.
    
    ## Authentication
    
    ### Merchant API (Bearer API Key)
    All `/api/v1/*` endpoints require a Bearer API key:
    ```
    Authorization: Bearer op_abcdefgh.1234567890abcdef1234567890
    ```
    
    ### Mobile API (Bearer JWT)
    All `/api/mobile/v1/*` endpoints require a JWT token from device pairing:
    ```
    Authorization: Bearer <JWT_ACCESS_TOKEN>
    ```
    
    ### Admin API (Bearer API Key)
    All `/api/admin/v1/*` endpoints require a Bearer API key with admin scope.
    
    ## Rate Limiting
    Default: 60 requests/minute per API key.
    
    ## Errors
    All API responses returning a non-2xx status follow this structure:
    ```json
    {
      "success": false,
      "error": "Error description message"
    }
    ```
  version: 0.1.0
  license:
    name: AGPL-3.0-or-later

servers:
  - url: https://pay.example.com
    description: Production
  - url: https://ownpay.test
    description: Local Development

tags:
  - name: Merchant
    summary: Core Merchant API Group
    kind: grouping
  - name: Health
    summary: System status and checks
    parent: Merchant
  - name: Payments
    summary: Payment initiation and query
    parent: Merchant
  - name: Transactions
    summary: Settlement and ledger transactions
    parent: Merchant
  - name: Refunds
    summary: Transaction charge reversals
    parent: Merchant
  - name: Customers
    summary: Brand customer profiles
    parent: Merchant
  - name: API Keys
    summary: Merchant API credentials
    parent: Merchant
  - name: Webhooks
    summary: Outbound delivery and validation
    parent: Merchant
  - name: Mobile
    summary: Mobile Companion API Group
    kind: grouping
  - name: Mobile - Devices
    summary: Companion Android device setup
    parent: Mobile
  - name: Mobile - SMS
    summary: Device-forwarded notification SMS logs
    parent: Mobile
  - name: Mobile - Notifications
    summary: Push triggers sent to devices
    parent: Mobile
  - name: Mobile - Dashboard
    summary: Dashboard aggregation for companion apps
    parent: Mobile
  - name: Mobile - Config
    summary: Regex rules and filter constraints
    parent: Mobile
  - name: Admin
    summary: System Administration API Group
    kind: grouping
  - name: Admin - SMS
    summary: SMS templates and analyzer queue
    parent: Admin
  - name: Admin - Devices
    summary: Pair control and active device revoking
    parent: Admin
  - name: Admin - Domains
    summary: Custom domain verification
    parent: Admin

paths:
  /api/v1/health:
    get:
      tags: [Health]
      summary: Health check
      description: Returns service availability, application version, and server timestamp.
      security:
        - BearerApiKey: []
      responses:
        '200':
          description: Service is healthy.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
        '401':
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/payments:
    post:
      tags: [Payments]
      summary: Initiate Payment Intent
      description: Initiates a new payment intent and returns the checkout URL.
      security:
        - BearerApiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaymentIntentInitiateRequest'
      responses:
        '201':
          description: Payment Intent successfully created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentIntentResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/payments/{payment_id}:
    get:
      tags: [Payments]
      summary: Get Payment Status
      description: Retrieves details of a specific payment intent by its unique payment intent UUID.
      security:
        - BearerApiKey: []
      parameters:
        - name: payment_id
          in: path
          required: true
          description: The unique payment intent UUID.
          schema:
            type: string
            format: uuid
          example: "01eb81ef-2479-4bfb-96d6-146ac41813d8"
      responses:
        '200':
          description: Payment details retrieved.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentIntentDetailResponse'
        '404':
          description: Payment Intent not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/transactions:
    get:
      tags: [Transactions]
      summary: List Transactions
      description: Returns a paginated list of transactions filtered by status.
      security:
        - BearerApiKey: []
      parameters:
        - name: page
          in: query
          required: false
          description: Page number for pagination (starts at 1)
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: per_page
          in: query
          required: false
          description: Number of records to return per page
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: status
          in: query
          required: false
          description: Filter transactions by status
          schema:
            type: string
            enum: [pending, completed, failed, cancelled, refunded]
      responses:
        '200':
          description: Paginated transaction list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionListResponse'

  /api/v1/transactions/{trx_id}:
    get:
      tags: [Transactions]
      summary: Get Transaction Details
      description: Retrieves complete details of a settled transaction.
      security:
        - BearerApiKey: []
      parameters:
        - name: trx_id
          in: path
          required: true
          description: |
            The unique transaction identifier. Accepts either:
            - A transaction number (e.g., `OP-10482938`)
            - A gateway transaction ID (e.g., `BKASH123456`)
          schema:
            type: string
          examples:
            transaction_no:
              summary: Transaction number
              value: "OP-10482938"
            gateway_trx_id:
              summary: Gateway transaction ID
              value: "BKASH123456"
      responses:
        '200':
          description: Transaction detail model.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionDetailResponse'
        '404':
          description: Transaction not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/refunds:
    post:
      tags: [Refunds]
      summary: Create Refund
      description: Creates a refund against a completed transaction.
      security:
        - BearerApiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefundCreateRequest'
      responses:
        '201':
          description: Refund created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefundCreateResponse'
        '400':
          description: Invalid refund (e.g. non-positive amount, exceeds refundable balance, transaction not refundable).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Transaction not found for this merchant.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Missing required field (transaction_id / trx_id).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    get:
      tags: [Refunds]
      summary: List Refunds
      description: Queries a paginated history of transaction refunds registered under the active merchant context.
      security:
        - BearerApiKey: []
      parameters:
        - name: page
          in: query
          description: The page number to retrieve.
          required: false
          schema:
            type: integer
            default: 1
        - name: per_page
          in: query
          description: The number of records per page (max 100).
          required: false
          schema:
            type: integer
            default: 25
        - name: status
          in: query
          description: Filter by refund status.
          required: false
          schema:
            type: string
            enum: [pending, completed, failed]
        - name: trx_id
          in: query
          description: Filter by the original transaction reference code.
          required: false
          schema:
            type: string
        - name: transaction_id
          in: query
          description: Filter by the internal transaction database ID.
          required: false
          schema:
            type: integer
        - name: from
          in: query
          description: Filter refunds created on or after this date (YYYY-MM-DD).
          required: false
          schema:
            type: string
            format: date
        - name: to
          in: query
          description: Filter refunds created on or before this date (YYYY-MM-DD).
          required: false
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Paginated refund list retrieved successfully.
          content:
            application/json:
              schema:
                type: object
                required: [success, data, meta]
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/RefundDetailResponse'
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'
        '401':
          $ref: '#/components/responses/Unauthenticated'

  /api/v1/refunds/{trx_id}:
    get:
      tags: [Refunds]
      summary: Get Refund Details
      description: Retrieves details of a specific refund using the transaction reference.
      security:
        - BearerApiKey: []
      parameters:
        - name: trx_id
          in: path
          required: true
          description: |
            The unique transaction identifier of the original payment. Accepts either:
            - A transaction number (e.g., `OP-10482938`)
            - A gateway transaction ID (e.g., `BKASH123456`)
          schema:
            type: string
          examples:
            transaction_no:
              summary: Transaction number
              value: "OP-10482938"
            gateway_trx_id:
              summary: Gateway transaction ID
              value: "BKASH123456"
      responses:
        '200':
          description: Refund details retrieved.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefundDetailResponse'
        '404':
          description: Refund record not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/customers:
    get:
      tags: [Customers]
      summary: List Customers
      description: Retrieves all registered customer profiles for the active brand.
      security:
        - BearerApiKey: []
      responses:
        '200':
          description: List of customers.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerListResponse'
    post:
      tags: [Customers]
      summary: Create Customer Profile
      description: Creates a new customer profile under the brand.
      security:
        - BearerApiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomerCreateRequest'
      responses:
        '201':
          description: Customer profile created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerDetailResponse'

  /api/v1/customers/{identifier}:
    get:
      tags: [Customers]
      summary: Get Customer Details
      description: Retrieves a customer profile by ID, email, or phone number.
      security:
        - BearerApiKey: []
      parameters:
        - name: identifier
          in: path
          required: true
          description: Customer database ID, email address, or phone number
          schema:
            type: string
          example: "+8801700000000"
      responses:
        '200':
          description: Customer profile details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerDetailResponse'
        '404':
          description: Customer not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/api-keys:
    get:
      tags: [API Keys]
      summary: List API Keys
      description: Returns a list of active API keys. Requires a Bearer API key with both `write` and `admin` scopes.
      security:
        - BearerApiKey: []
      parameters:
        - name: X-Super-Admin-Email
          in: header
          required: true
          schema:
            type: string
          description: The email of an active super admin user.
      responses:
        '200':
          description: List of API keys.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiKeyListResponse'
    post:
      tags: [API Keys]
      summary: Generate API Key
      description: Generates a new API key for the active brand. Requires a Bearer API key with both `write` and `admin` scopes.
      security:
        - BearerApiKey: []
      parameters:
        - name: X-Super-Admin-Email
          in: header
          required: true
          schema:
            type: string
          description: The email of an active super admin user.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApiKeyGenerateRequest'
      responses:
        '201':
          description: Key successfully generated. (The full token is only shown once).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiKeyGenerateResponse'

  /api/v1/api-keys/{id}:
    delete:
      tags: [API Keys]
      summary: Revoke API Key
      description: Deactivates and permanently revokes an API key by database ID. Requires a Bearer API key with both `write` and `admin` scopes.
      security:
        - BearerApiKey: []
      parameters:
        - name: id
          in: path
          required: true
          description: API key ID
          schema:
            type: integer
          example: 3
        - name: X-Super-Admin-Email
          in: header
          required: true
          schema:
            type: string
          description: The email of an active super admin user.
      responses:
        '200':
          description: API key permanently revoked.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessOnlyResponse'
        '404':
          description: API key not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/webhooks/tests:
    post:
      tags: [Webhooks]
      summary: Test Webhook Dispatch
      description: Sends a test HMAC-SHA256 payload to the brand's active webhook URL endpoint.
      security:
        - BearerApiKey: []
      responses:
        '200':
          description: Test webhook sent.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookTestResponse'

  /api/v1/webhooks/deliveries:
    get:
      tags: [Webhooks]
      summary: Get Webhook Delivery Logs
      description: Returns a log of outbound webhooks dispatched to merchant servers, including delivery status codes.
      security:
        - BearerApiKey: []
      responses:
        '200':
          description: Webhook logs retrieved.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookDeliveriesResponse'

  /csp-report-api:
    post:
      tags: [Webhooks]
      summary: CSP Report Endpoint
      description: Handles Content Security Policy violation reports. No authentication required.
      requestBody:
        required: true
        content:
          application/csp-report:
            schema:
              type: object
      responses:
        '204':
          description: Report recorded.

  # Mobile API (JWT authenticated companion app interactions)
  /api/mobile/v1/devices:
    post:
      tags: [Mobile - Devices]
      summary: Pair Companion Device
      description: Validates an OTP pairing code generated from the admin panel to authorize a mobile app. Returns a JWT access token.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DevicePairRequest'
      responses:
        '201':
          description: Device paired. Returns authorization tokens.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DevicePairResponse'
        '400':
          description: Invalid pairing code or pairing expired
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/mobile/v1/devices/heartbeats:
    post:
      tags: [Mobile - Devices]
      summary: Submit Heartbeat
      description: Update device online activity and connection status.
      security:
        - BearerJWT: []
      responses:
        '200':
          description: Status saved.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HeartbeatResponse'

  /api/mobile/v1/devices/{id}:
    delete:
      tags: [Mobile - Devices]
      summary: Revoke Current Device
      description: Self-revokes the active device session and voids authorization tokens by database ID or UUID.
      security:
        - BearerJWT: []
      parameters:
        - name: id
          in: path
          required: true
          description: Unique device database ID or UUID
          schema:
            type: string
          example: "dev_xxxxxxxxxxxxxxxxxxxxxxxx"
      responses:
        '200':
          description: Revoked.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessOnlyResponse'

  /api/mobile/v1/devices/bulk-revocations:
    post:
      tags: [Mobile - Devices]
      summary: Bulk Revoke Devices
      description: Revokes multiple device keys in a single operation.
      security:
        - BearerJWT: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BulkRevokeRequest'
      responses:
        '200':
          description: Devices revoked.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BulkRevokeResponse'

  /api/mobile/v1/devices/token-refreshes:
    post:
      tags: [Mobile - Devices]
      summary: Refresh JWT Access Token
      description: Exchange a valid refresh token for a new short-lived JWT token. This operation implements Token Rotation; a new refresh token is returned and the old one is blacklisted.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token:
                  type: string
                  description: The current valid refresh token (JWT format)
                  example: "<REFRESH_TOKEN>"
      responses:
        '200':
          description: Access token refreshed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenRefreshResponse'
        '401':
          description: Invalid or expired refresh token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Device revoked or not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/mobile/v1/devices/statuses:
    get:
      tags: [Mobile - Devices]
      summary: Query Current Device Status
      description: Checks active validation status of the device JWT session and returns metadata.
      security:
        - BearerJWT: []
      responses:
        '200':
          description: Status retrieved.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceStatusResponse'

  /api/mobile/v1/sms:
    post:
      tags: [Mobile - SMS]
      summary: Upload Parsed SMS
      description: Receives SMS notification details forwarded by the mobile app, runs parser engines, and updates payment states. Accepts either a single SMS payload or a batch array of payloads.
      security:
        - BearerJWT: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: '#/components/schemas/SingleSmsUploadRequest'
                - $ref: '#/components/schemas/BatchSmsUploadRequest'
      responses:
        '200':
          description: SMS processed successfully.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/SingleSmsUploadResponse'
                  - $ref: '#/components/schemas/BatchSmsUploadResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/mobile/v1/sms/queues:
    get:
      tags: [Mobile - SMS]
      summary: Get Pending SMS Queue
      description: Returns list of SMS waiting for dynamic regex processing rules.
      security:
        - BearerJWT: []
      responses:
        '200':
          description: Queue details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SmsQueueResponse'

  /api/mobile/v1/notifications:
    get:
      tags: [Mobile - Notifications]
      summary: Get Active Push Notifications
      description: Queries unacknowledged pushes targeting the companion device.
      security:
        - BearerJWT: []
      responses:
        '200':
          description: Push notifications payload.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActiveNotificationsResponse'

  /api/mobile/v1/notifications/acknowledgements:
    post:
      tags: [Mobile - Notifications]
      summary: Acknowledge Push Deliveries
      description: Marks specified push notifications as received.
      security:
        - BearerJWT: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ids]
              properties:
                ids:
                  type: array
                  items:
                    type: integer
                  description: Array of notification IDs to acknowledge
                  example: [12, 13]
      responses:
        '200':
          description: Acknowledged.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessOnlyResponse'

  /api/mobile/v1/dashboard:
    get:
      tags: [Mobile - Dashboard]
      summary: Get Mobile Dashboard Metrics
      description: Aggregated transaction statistics and activity logs formatted for mobile displays.
      security:
        - BearerJWT: []
      responses:
        '200':
          description: Aggregated stats.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MobileDashboardResponse'

  /api/mobile/v1/config/filter-rules:
    get:
      tags: [Mobile - Config]
      summary: Get SMS Processing Rules
      description: Returns regex whitelist senders, negative keywords, and interval queries.
      security:
        - BearerJWT: []
      responses:
        '200':
          description: SMS filter configurations.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FilterRulesResponse'

  # Admin API endpoints
  /api/admin/v1/sms-templates:
    get:
      tags: [Admin - SMS]
      summary: List SMS Regex Templates
      description: Returns list of regex template rules matching merchant payment texts.
      security:
        - BearerApiKey: []
      responses:
        '200':
          description: List of templates.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SmsTemplateListResponse'

  /api/admin/v1/sms-templates/{id}:
    put:
      tags: [Admin - SMS]
      summary: Update SMS Regex Template
      description: Modifies matching rules for bank notifications.
      security:
        - BearerApiKey: []
      parameters:
        - name: id
          in: path
          required: true
          description: The template database ID
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SmsTemplateUpdateRequest'
      responses:
        '200':
          description: Template updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SmsTemplateDetailResponse'
        '404':
          description: Template not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/admin/v1/sms-queues:
    get:
      tags: [Admin - SMS]
      summary: List Admin SMS Parsing Queue
      description: Review parsed, matched, or pending SMS items.
      security:
        - BearerApiKey: []
      responses:
        '200':
          description: SMS log entries.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminSmsQueueResponse'

  /api/admin/v1/sms-queues/{id}/retries:
    post:
      tags: [Admin - SMS]
      summary: Retry SMS Processing
      description: Reruns regex pattern match against a stored SMS text manually.
      security:
        - BearerApiKey: []
      parameters:
        - name: id
          in: path
          required: true
          description: The parsed SMS ID
          schema:
            type: integer
      responses:
        '200':
          description: Job dispatched.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessWithMessageResponse'
        '404':
          description: SMS record not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/admin/v1/devices:
    get:
      tags: [Admin - Devices]
      summary: List Registered Devices
      description: Returns complete audit list of paired companion phones.
      security:
        - BearerApiKey: []
      responses:
        '200':
          description: Devices list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminDeviceListResponse'

  /api/admin/v1/devices/{id}:
    delete:
      tags: [Admin - Devices]
      summary: Force Revoke Device
      description: System-wide admin revocation of a paired device by device database ID or UUID.
      security:
        - BearerApiKey: []
      parameters:
        - name: id
          in: path
          required: true
          description: Unique device database ID or UUID
          schema:
            type: string
      responses:
        '200':
          description: Device revoked.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessOnlyResponse'
        '404':
          description: Device not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/admin/v1/domains/verifications:
    post:
      tags: [Admin - Domains]
      summary: Trigger Verification Cron
      description: Forces immediate verification of custom domain DNS CNAME mapping status.
      security:
        - BearerApiKey: []
      responses:
        '200':
          description: DNS scan completed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessWithMessageResponse'

components:
  securitySchemes:
    BearerApiKey:
      type: http
      scheme: bearer
      description: "Admin/Merchant API key (header: `Authorization: Bearer op_abcdefgh.12345678...`)"
    BearerJWT:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: "JWT access token returned by device pairing (header: `Authorization: Bearer eyJ...`)"

  schemas:
    ErrorItem:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          example: "VALIDATION_FAILED"
          description: "Machine-readable error classification code"
        message:
          type: string
          example: "The amount field must be greater than zero."
          description: "Human-readable error description"
        field:
          type: string
          nullable: true
          example: "amount"
          description: "The request body parameter or header scope causing this error"

    ErrorResponse:
      type: object
      required: [success, error, errors, request_id]
      description: >
        Standard error envelope for validation and business-logic errors (emitted by
        Response::apiError). NOTE: authentication/authorization failures from the auth
        middleware (most 401s, and 403 "Insufficient scope") use the simpler shape
        `{ "success": false, "message": "..." }` instead — see AuthErrorResponse.
      properties:
        success:
          type: boolean
          example: false
        error:
          type: string
          example: "Validation failed"
          description: "The primary high-level error summary message"
        errors:
          type: array
          items:
            $ref: '#/components/schemas/ErrorItem'
          description: "List of fine-grained error reasons"
        request_id:
          type: string
          example: "req_6656c12345678"
          description: "A unique tracing ID assigned to this request for support/debugging audits"

    AuthErrorResponse:
      type: object
      required: [success, message]
      description: >
        Error shape returned by the authentication/authorization middleware for
        missing/invalid/expired/revoked credentials, insufficient scope, or a
        suspended merchant (HTTP 401/403). Distinct from the richer ErrorResponse.
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
          example: "Authentication required. Provide Bearer token."

    SuccessOnlyResponse:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
          example: true

    SuccessWithMessageResponse:
      type: object
      required: [success, message]
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: "Operation completed successfully"

    HealthResponse:
      type: object
      required: [success, version, server_time]
      properties:
        success:
          type: boolean
          example: true
        version:
          type: string
          example: "0.1.0"
        server_time:
          type: string
          format: date-time
          example: "2026-05-21T02:40:00+06:00"

    PaymentIntentInitiateRequest:
      type: object
      required: [amount, currency]
      properties:
        amount:
          type: number
          format: float
          minimum: 0.01
          example: 500.00
          description: "Transaction amount with up to 2 decimal places"
        currency:
          type: string
          pattern: "^[A-Z]{3}$"
          example: "BDT"
          description: "ISO 4217 3-letter currency code (e.g. BDT, USD)"
        description:
          type: string
          maxLength: 255
          example: "Order #104829"
          description: "Human readable transaction summary"
        redirect_url:
          type: string
          format: uri
          example: "https://myshop.com/success"
          description: "URL customer is redirected to after successful payment"
        cancel_url:
          type: string
          format: uri
          example: "https://myshop.com/cancel"
          description: "URL customer is redirected to if payment is cancelled"
        callback_url:
          type: string
          format: uri
          example: "https://myshop.com/webhook"
          description: "Outbound HTTP callback (webhook) URL for status changes. Also used as the default redirect_url/cancel_url when those are omitted."
        metadata:
          type: object
          example:
            invoice_id: 12948
            product: "Ultra Gaming Chair"
          description: "Arbitrary JSON payload linked to the transaction for merchant query acceleration"

    PaymentIntentResponse:
      type: object
      required: [success, data]
      description: "201 Created. The payload is wrapped under `data` (all success responses use this envelope)."
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object
          required: [payment_id, token, checkout_url, status]
          properties:
            payment_id:
              type: string
              example: "9f1c2e7a-1b3d-4c5e-8a90-112233445566"
              description: "The payment intent UUID"
            token:
              type: string
              example: "pi_xxxxxxxxxxxxxxxxxxxxxxxx"
              description: "The unique payment intent token"
            checkout_url:
              type: string
              format: uri
              example: "https://pay.myshop.com/checkout/intent/pi_xxxxxxxxxxxxxxxxxxxxxxxx"
              description: "The dynamic customer-facing white-label checkout URL"
            status:
              type: string
              example: "pending"
              description: "Initial intent status"

    PaymentIntentDetailResponse:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object
          required: [id, uuid, amount, currency, status, metadata]
          properties:
            id:
              type: integer
              example: 45
            uuid:
              type: string
              example: "pi_xxxxxxxxxxxxxxxxxxxxxxxx"
            amount:
              type: string
              example: "500.00"
            currency:
              type: string
              example: "BDT"
            status:
              type: string
              enum: [pending, completed, failed, cancelled, refunded]
              example: "completed"
            metadata:
              type: object
              example:
                invoice_id: 12948
                product: "Ultra Gaming Chair"

    Transaction:
      type: object
      required: [id, transaction_no, merchant_id, customer_id, gateway_id, amount, currency, status, created_at]
      properties:
        id:
          type: integer
          example: 102
        transaction_no:
          type: string
          example: "OP-10482938"
        merchant_id:
          type: integer
          example: 1
        customer_id:
          type: integer
          example: 22
        gateway_id:
          type: integer
          example: 5
        amount:
          type: string
          example: "500.00"
        currency:
          type: string
          example: "BDT"
        status:
          type: string
          enum: [pending, completed, failed, cancelled, refunded]
          example: "completed"
        gateway_trx_id:
          type: string
          nullable: true
          example: "BKASH123456"
        created_at:
          type: string
          format: date-time
          example: "2026-05-21T02:45:00.000000+06:00"

    TransactionListResponse:
      type: object
      required: [success, data, pagination]
      properties:
        success:
          type: boolean
          example: true
        data:
          type: array
          items:
            $ref: '#/components/schemas/Transaction'
        pagination:
          type: object
          required: [page, per_page, total_records, total_pages]
          properties:
            page:
              type: integer
              example: 1
            per_page:
              type: integer
              example: 20
            total_records:
              type: integer
              example: 145
            total_pages:
              type: integer
              example: 8

    TransactionDetailResponse:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          example: true
        data:
          $ref: '#/components/schemas/Transaction'

    RefundCreateRequest:
      type: object
      required: [transaction_id, amount]
      properties:
        transaction_id:
          type: string
          description: "Transaction number or payment intent UUID to refund"
          example: "OP-10482938"
        amount:
          type: number
          format: float
          minimum: 0.01
          description: "Amount to refund (can be partial or full)"
          example: 250.00
        reason:
          type: string
          maxLength: 255
          description: "Reason for the refund"
          example: "Customer return request"

    RefundCreateResponse:
      type: object
      required: [success, data]
      description: "201 Created. The created refund record is wrapped under `data`."
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object
          required: [id, uuid, transaction_id, amount, status, created_at]
          properties:
            id:
              type: integer
              example: 12
            uuid:
              type: string
              example: "b2c3d4e5-6f70-4812-9a3b-445566778899"
            transaction_id:
              type: integer
              example: 102
            amount:
              type: string
              example: "250.00"
            reason:
              type: string
              nullable: true
              example: "Customer return request"
            status:
              type: string
              example: "completed"
              description: "Refund status (e.g. pending, completed, failed)"
            processed_at:
              type: string
              format: date-time
              nullable: true
              example: "2026-05-21T03:00:05.000000+06:00"
            created_at:
              type: string
              format: date-time
              example: "2026-05-21T03:00:00.000000+06:00"

    RefundDetailResponse:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object
          required: [id, refund_no, transaction_id, amount, reason, created_at]
          properties:
            id:
              type: integer
              example: 12
            refund_no:
              type: string
              example: "RFD-28391823"
            transaction_id:
              type: integer
              example: 102
            amount:
              type: string
              example: "250.00"
            reason:
              type: string
              example: "Customer return request"
            created_at:
              type: string
              format: date-time
              example: "2026-05-21T03:00:00.000000+06:00"

    Customer:
      type: object
      required: [id, merchant_id, name, email, phone, created_at]
      properties:
        id:
          type: integer
          example: 22
        merchant_id:
          type: integer
          example: 1
        name:
          type: string
          example: "John Doe"
        email:
          type: string
          format: email
          example: "john@example.com"
        phone:
          type: string
          example: "+8801700000000"
        created_at:
          type: string
          format: date-time
          example: "2026-05-21T02:45:00.000000+06:00"

    CustomerListResponse:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          example: true
        data:
          type: array
          items:
            $ref: '#/components/schemas/Customer'

    CustomerCreateRequest:
      type: object
      required: [name, phone]
      properties:
        name:
          type: string
          example: "John Doe"
        email:
          type: string
          format: email
          example: "john@example.com"
        phone:
          type: string
          example: "+8801700000000"

    CustomerDetailResponse:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          example: true
        data:
          $ref: '#/components/schemas/Customer'

    ApiKey:
      type: object
      required: [id, name, prefix, status, created_at]
      properties:
        id:
          type: integer
          example: 3
        name:
          type: string
          example: "Production Server Key"
        prefix:
          type: string
          example: "abcdefgh"
        status:
          type: string
          enum: [active, revoked]
          example: "active"
        last_used:
          type: string
          format: date-time
          nullable: true
          example: null
        expires_at:
          type: string
          format: date-time
          nullable: true
          example: null
        created_at:
          type: string
          format: date-time
          example: "2026-05-21T02:45:00.000000+06:00"

    ApiKeyListResponse:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          example: true
        data:
          type: array
          items:
            $ref: '#/components/schemas/ApiKey'

    ApiKeyGenerateRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          maxLength: 100
          example: "Production Server Key"
        scopes:
          type: array
          items:
            type: string
            enum: [read, write, admin]
          default: [read, write]
          description: "List of scopes/privileges granted to the new API key."
          example: ["read", "write"]

    ApiKeyGenerateResponse:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object
          required: [key, prefix, warning]
          properties:
            key:
              type: string
              example: "op_abcdefgh.1234567890abcdef1234567890"
              description: "The full unmasked API key token. ONLY returned during generation."
            prefix:
              type: string
              example: "abcdefgh"
              description: "The API key prefix."
            warning:
              type: string
              example: "Store this key securely. It cannot be retrieved again."

    WebhookTestResponse:
      type: object
      required: [success, message]
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: "Test webhook dispatched successfully to http://myshop.com/webhook"

    WebhookDeliveryLog:
      type: object
      required: [id, transaction_id, url, payload, status_code, attempt, is_success, created_at]
      properties:
        id:
          type: integer
          example: 124
        transaction_id:
          type: integer
          example: 102
        url:
          type: string
          format: uri
          example: "https://myshop.com/webhook"
        payload:
          type: string
          example: "{\"event\":\"payment.completed\",\"transaction_id\":\"OP-10482938\",\"amount\":\"500.00\",\"currency\":\"BDT\",\"gateway\":\"bkash\",\"status\":\"completed\",\"timestamp\":\"2026-05-21T02:45:00+06:00\"}"
        status_code:
          type: integer
          example: 200
        attempt:
          type: integer
          example: 1
        is_success:
          type: integer
          enum: [0, 1]
          example: 1
        created_at:
          type: string
          format: date-time
          example: "2026-05-21T02:45:05.000000+06:00"

    WebhookDeliveriesResponse:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          example: true
        data:
          type: array
          items:
            $ref: '#/components/schemas/WebhookDeliveryLog'

    DevicePairRequest:
      type: object
      required: [pairing_code, device_id]
      properties:
        pairing_code:
          type: string
          pattern: "^[0-9]{6}$"
          example: "594830"
          description: "6-digit temporary OTP pairing code"
        device_id:
          type: string
          example: "android_id_string_or_unique_identifier"
          description: "Unique persistent device fingerprint / platform ID"
        device_name:
          type: string
          example: "Samsung S24 Ultra"
        platform:
          type: string
          enum: [android, ios]
          default: "android"
        app_version:
          type: string
          example: "1.0.0"

    DevicePairResponse:
      type: object
      required: [success, access_token, device_uuid, refresh_token, expires_in]
      properties:
        success:
          type: boolean
          example: true
        access_token:
          type: string
          example: "<JWT_ACCESS_TOKEN>"
          description: "JWT access token for subsequent API calls (TTL: 15m)"
        device_uuid:
          type: string
          example: "device-uuid-value"
          description: "Server-assigned unique device ID"
        refresh_token:
          type: string
          example: "<JWT_REFRESH_TOKEN>"
          description: "JWT refresh token used to rotate credentials (TTL: 30 days)"
        aes_key:
          type: string
          example: "aabbccddeeff00112233..."
          description: "Base16 / Hex end-to-end payload encryption key"
        expires_in:
          type: integer
          example: 900
          description: "Access token lifetime in seconds"

    HeartbeatResponse:
      type: object
      required: [success, server_time]
      properties:
        success:
          type: boolean
          example: true
        server_time:
          type: string
          format: date-time
          example: "2026-05-21T03:30:00+06:00"

    BulkRevokeRequest:
      type: object
      required: [device_ids]
      properties:
        device_ids:
          type: array
          items:
            type: integer
          example: [3, 4, 12]

    BulkRevokeResponse:
      type: object
      required: [success, revoked]
      properties:
        success:
          type: boolean
          example: true
        revoked:
          type: integer
          example: 3
          description: "Number of successfully revoked devices"

    TokenRefreshResponse:
      type: object
      required: [success, access_token, refresh_token, expires_in, server_time]
      properties:
        success:
          type: boolean
          example: true
        access_token:
          type: string
          example: "<JWT_ACCESS_TOKEN>"
        refresh_token:
          type: string
          example: "<JWT_REFRESH_TOKEN>"
        expires_in:
          type: integer
          example: 900
        server_time:
          type: string
          format: date-time
          example: "2026-05-21T03:32:00+06:00"

    DeviceStatusResponse:
      type: object
      required: [success, device_id, device_name, platform, status, merchant_id, server_time]
      properties:
        success:
          type: boolean
          example: true
        device_id:
          type: string
          example: "device-uuid-value"
        device_name:
          type: string
          example: "Samsung S24 Ultra"
        platform:
          type: string
          example: "android"
        status:
          type: string
          enum: [active, revoked, inactive]
          example: "active"
        last_heartbeat:
          type: string
          format: date-time
          nullable: true
          example: "2026-05-21T03:30:00+06:00"
        merchant_id:
          type: integer
          example: 1
        server_time:
          type: string
          format: date-time
          example: "2026-05-21T03:32:15+06:00"

    SmsUploadItem:
      type: object
      required: [sender]
      properties:
        local_id:
          type: integer
          nullable: true
          example: 42
        sender:
          type: string
          example: "bKash"
        encrypted_payload:
          type: string
          description: "AES-256-GCM ciphertext base64 encoded, or raw text body"
          example: "M2MxOWMy..."
        body:
          type: string
          description: "Alternative raw payload text (fallback)"
          example: "You have received Tk 500.00 from 01700000000. Ref: pi_xxx. TrxID TXN129482938."
        received_at:
          type: string
          format: date-time
          example: "2026-05-21T03:00:00+06:00"

    SingleSmsUploadRequest:
      $ref: '#/components/schemas/SmsUploadItem'

    BatchSmsUploadRequest:
      type: object
      required: [messages]
      properties:
        messages:
