    SmsTemplate:
      type: object
      required: [id, merchant_id, sender_pattern, regex_pattern, transaction_type, provider_name, currency, priority, is_active, created_at]
      properties:
        id:
          type: integer
          example: 1
        merchant_id:
          type: integer
          example: 1
        sender_pattern:
          type: string
          example: "bKash"
        regex_pattern:
          type: string
          example: "/You have received Tk (?<amount>[\\d.]+)/i"
        transaction_type:
          type: string
          enum: [credit, debit]
          example: "credit"
        provider_name:
          type: string
          example: "bKash"
        currency:
          type: string
          example: "BDT"
        priority:
          type: integer
          example: 10
        is_active:
