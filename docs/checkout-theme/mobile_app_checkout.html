<!DOCTYPE html>
<html lang="en" class="antialiased">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Secure Checkout - Own Pay</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/flowbite/2.3.0/flowbite.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-primary: #3b82f6;
            --brand-gradient: linear-gradient(135deg, #2563eb 0%, #1e40af 100%);
        }
        body { 
            font-family: 'Inter', sans-serif; 
            -webkit-tap-highlight-color: transparent; 
            background-color: #f8fafc;
            overflow-x: hidden;
        }
        .dark body { background-color: #0f172a; }
        
        /* Smooth Scroll & Hide Scrollbar */
        html { scroll-behavior: smooth; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Safe Areas for iOS */
        .safe-bottom { padding-bottom: calc(env(safe-area-inset-bottom, 20px) + 1.5rem); }
        .safe-top { padding-top: calc(env(safe-area-inset-top, 0px) + 1rem); }
        
        /* Ambient Background Mesh */
        .ambient-mesh {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: -1;
            background: 
                radial-gradient(circle at 15% 50%, rgba(59, 130, 246, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 85% 30%, rgba(139, 92, 246, 0.08) 0%, transparent 50%);
            pointer-events: none;
        }
        .dark .ambient-mesh {
            background: 
                radial-gradient(circle at 15% 50%, rgba(59, 130, 246, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 85% 30%, rgba(139, 92, 246, 0.15) 0%, transparent 50%);
        }

        /* Entrance Animations */
        @keyframes slideUpFade {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-enter { animation: slideUpFade 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; }
        .delay-100 { animation-delay: 100ms; }
        .delay-200 { animation-delay: 200ms; }
        .delay-300 { animation-delay: 300ms; }

        /* Custom Gateway Card Styles */
        .gw-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }
        .gw-card::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: inherit;
            box-shadow: inset 0 0 0 2px transparent;
            transition: box-shadow 0.3s ease;
        }
        .gw-card.active {
            background: rgba(59, 130, 246, 0.05);
            border-color: #3b82f6;
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(59, 130, 246, 0.1);
        }
        .gw-card.active::after {
            box-shadow: inset 0 0 0 1px #3b82f6;
        }
        .dark .gw-card.active {
            background: rgba(59, 130, 246, 0.15);
            border-color: #60a5fa;
            box-shadow: 0 10px 25px -5px rgba(59, 130, 246, 0.2);
        }
        .dark .gw-card.active::after { box-shadow: inset 0 0 0 1px #60a5fa; }
        
        .gw-card:active { transform: scale(0.96); }

        /* Dynamic Accordion Form Area */
        .form-area {
            display: grid;
            grid-template-rows: 0fr;
            transition: grid-template-rows 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .form-area.open { grid-template-rows: 1fr; }
        .form-content { overflow: hidden; }

        /* Premium Input Styles */
        .premium-input {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(8px);
            transition: all 0.2s ease;
        }
        .dark .premium-input { background: rgba(30, 41, 59, 0.6); }
        .premium-input:focus-within {
            background: #fff;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
            border-color: #3b82f6;
        }
        .dark .premium-input:focus-within {
            background: #1e293b;
            box-shadow: 0 0 0 3px rgba(96, 165, 250, 0.2);
            border-color: #60a5fa;
        }

        /* Glassmorphism Pay Bar */
        .glass-panel {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        .dark .glass-panel {
            background: rgba(15, 23, 42, 0.85);
        }

        /* Pay Button Shimmer */
        .btn-shimmer {
            position: relative;
            overflow: hidden;
            background: var(--brand-gradient);
        }
        .btn-shimmer::before {
            content: '';
            position: absolute;
            top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.3), transparent);
            transform: skewX(-20deg);
            animation: shimmer 3s infinite;
        }
        @keyframes shimmer {
            0% { left: -100%; }
            20% { left: 200%; }
            100% { left: 200%; }
        }
    </style>
    <script>
        tailwind.config = {
            darkMode: 'media',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    boxShadow: {
                        'soft': '0 4px 20px -2px rgba(0, 0, 0, 0.05)',
                        'glow': '0 0 20px rgba(59, 130, 246, 0.3)',
                    }
                }
            }
        }
    </script>
</head>
<body class="text-gray-900 dark:text-white pb-[140px]">
    
    <!-- Ambient Background -->
    <div class="ambient-mesh"></div>

    <!-- Top App Bar -->
    <header class="flex items-center justify-between px-5 py-3 safe-top sticky top-0 z-40 glass-panel border-b border-gray-200/50 dark:border-gray-800/50 animate-enter">
        <button class="w-10 h-10 -ml-2 rounded-full flex items-center justify-center hover:bg-gray-200/50 dark:hover:bg-gray-800/50 transition-colors focus:outline-none backdrop-blur-sm">
            <svg class="w-5 h-5 text-gray-700 dark:text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"></path></svg>
        </button>
        <div class="flex items-center gap-2">
            <div class="w-7 h-7 bg-blue-600 rounded-lg flex items-center justify-center shadow-lg shadow-blue-500/30">
                <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6m0 0v6m0-6h6m-6 0H6"/></svg>
            </div>
            <span class="text-sm font-bold tracking-tight text-gray-900 dark:text-white">Own Pay</span>
        </div>
        <div class="w-10 h-10 -mr-2 rounded-full flex items-center justify-center">
            <div class="relative flex h-3 w-3">
              <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
              <span class="relative inline-flex rounded-full h-3 w-3 bg-emerald-500 shadow-glow"></span>
            </div>
        </div>
    </header>

    <main class="w-full max-w-lg mx-auto px-5 sm:px-6 pt-6">
        
        <!-- Hero Amount Section -->
        <div class="flex flex-col items-center mb-8 animate-enter delay-100">
            <div class="bg-white/60 dark:bg-gray-800/60 backdrop-blur-md border border-gray-200/50 dark:border-gray-700/50 px-4 py-1.5 rounded-full mb-4 shadow-sm">
                <span class="text-[11px] font-bold text-gray-500 dark:text-gray-400 tracking-widest uppercase">Total Payable</span>
            </div>
            <h1 class="text-5xl sm:text-6xl font-black tracking-tighter text-gray-900 dark:text-white drop-shadow-sm flex items-baseline">
                <span class="text-3xl text-gray-400 dark:text-gray-500 mr-1 font-semibold">৳</span>
                4,500<span class="text-3xl text-gray-300 dark:text-gray-600 font-bold">.00</span>
            </h1>
            <button class="mt-4 flex items-center gap-1.5 text-xs font-semibold text-blue-600 dark:text-blue-400 bg-blue-50 dark:bg-blue-900/30 px-3 py-1.5 rounded-full transition-transform active:scale-95" onclick="toggleDetails()">
                View Details
                <svg id="detailsIcon" class="w-3.5 h-3.5 transition-transform duration-300" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"></path></svg>
            </button>
        </div>

        <!-- Hidden Order Details (Smooth Accordion) -->
        <div id="orderDetails" class="form-area mb-8 -mt-2">
            <div class="form-content">
                <div class="p-5 bg-white dark:bg-gray-800 rounded-3xl border border-gray-100 dark:border-gray-700 shadow-soft">
                    <div class="space-y-3">
                        <div class="flex justify-between text-sm"><span class="text-gray-500 dark:text-gray-400 font-medium">Subscription Pro</span><span class="font-bold text-gray-900 dark:text-gray-100">৳4,200</span></div>
                        <div class="flex justify-between text-sm"><span class="text-gray-500 dark:text-gray-400 font-medium">Gateway Fee</span><span class="font-bold text-gray-900 dark:text-gray-100">৳300</span></div>
                        <div class="pt-3 mt-3 border-t border-gray-100 dark:border-gray-700 flex justify-between">
                            <span class="text-xs font-mono text-gray-400">TXN-99B2X</span>
                            <span class="text-xs font-bold text-emerald-600 dark:text-emerald-400 flex items-center gap-1">
                                <svg class="w-3 h-3" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M2.166 4.999A11.954 11.954 0 0010 1.944 11.954 11.954 0 0017.834 5c.11.65.166 1.32.166 2.001 0 5.225-3.34 9.67-8 11.317C5.34 16.67 2 12.225 2 7c0-.682.057-1.35.166-2.001zm11.541 3.708a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"></path></svg>
                                SSL Secured
                            </span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Smart Payment Selection -->
        <h2 class="text-[13px] font-bold text-gray-400 dark:text-gray-500 uppercase tracking-widest mb-3 animate-enter delay-200 pl-1">Select Method</h2>
        
        <div class="grid grid-cols-2 gap-3 mb-6 animate-enter delay-200">
            <!-- bKash -->
            <button class="gw-card active p-4 rounded-3xl border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800/80 flex flex-col items-center justify-center gap-2 " onclick="activateGateway(this, 'bkashForm')">
                <div class="w-12 h-12 bg-gray-50 dark:bg-gray-700/50 rounded-2xl flex items-center justify-center shadow-inner">
                    <span class="font-black text-pink-600 text-2xl drop-shadow-sm">b</span>
                </div>
                <span class="text-sm font-bold text-gray-700 dark:text-gray-200 tracking-tight">bKash</span>
                <div class="absolute top-3 right-3 text-blue-600 dark:text-blue-400 opacity-100 transition-opacity check-mark">
                    <svg class="w-5 h-5 drop-shadow-md" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"></path></svg>
                </div>
            </button>

            <!-- Cards -->
            <button class="gw-card p-4 rounded-3xl border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800/80 flex flex-col items-center justify-center gap-2" onclick="activateGateway(this, 'cardForm')">
                <div class="w-12 h-12 bg-gray-50 dark:bg-gray-700/50 rounded-2xl flex items-center justify-center shadow-inner">
                    <svg class="w-6 h-6 text-indigo-600 dark:text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"></path></svg>
                </div>
                <span class="text-sm font-bold text-gray-700 dark:text-gray-200 tracking-tight">Credit Card</span>
                <div class="absolute top-3 right-3 text-blue-600 opacity-0 transition-opacity check-mark">
                    <svg class="w-5 h-5 drop-shadow-md" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"></path></svg>
                </div>
            </button>
        </div>

        <!-- Dynamic Form Area -->
        <div class="animate-enter delay-300">
            <!-- bKash Form -->
            <div id="bkashForm" class="active-form space-y-4">
                <div class="premium-input relative border border-gray-200 dark:border-gray-700 rounded-2xl p-2 flex items-center shadow-soft">
                    <div class="pl-3 pr-2 flex items-center border-r border-gray-200 dark:border-gray-700">
                        <span class="text-xl mr-2">🇧🇩</span>
                        <span class="text-sm font-bold text-gray-500">+880</span>
                    </div>
                    <input type="tel" class="w-full bg-transparent border-0 px-3 py-3 text-lg font-bold text-gray-900 dark:text-white placeholder-gray-400 focus:ring-0" placeholder="1XXXXXXXXX" value="1712345678">
                </div>
                
                <div class="premium-input relative border border-gray-200 dark:border-gray-700 rounded-2xl p-2 flex items-center shadow-soft">
                    <div class="pl-3 pr-2 flex items-center">
                        <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
                    </div>
                    <input type="password" pattern="[0-9]*" inputmode="numeric" class="w-full bg-transparent border-0 px-2 py-3 text-2xl tracking-[0.3em] font-black text-gray-900 dark:text-white placeholder-gray-400 focus:ring-0 text-center" placeholder="••••">
                </div>
            </div>

            <!-- Card Form (Hidden smoothly via JS initially) -->
            <div id="cardForm" class="hidden-form space-y-4 hidden">
                <div class="premium-input relative border border-gray-200 dark:border-gray-700 rounded-2xl p-2 flex items-center shadow-soft">
                    <div class="pl-3 pr-2">
                        <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"></path></svg>
                    </div>
                    <input type="tel" inputmode="numeric" class="w-full bg-transparent border-0 px-2 py-3 text-lg font-bold font-mono tracking-widest text-gray-900 dark:text-white placeholder-gray-400 focus:ring-0" placeholder="0000 0000 0000 0000">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="premium-input relative border border-gray-200 dark:border-gray-700 rounded-2xl p-2 flex items-center shadow-soft">
                        <input type="tel" class="w-full bg-transparent border-0 px-4 py-3 text-center text-lg font-bold font-mono text-gray-900 dark:text-white placeholder-gray-400 focus:ring-0" placeholder="MM/YY">
                    </div>
                    <div class="premium-input relative border border-gray-200 dark:border-gray-700 rounded-2xl p-2 flex items-center shadow-soft">
                        <input type="password" inputmode="numeric" class="w-full bg-transparent border-0 px-4 py-3 text-center text-lg font-bold font-mono tracking-widest text-gray-900 dark:text-white placeholder-gray-400 focus:ring-0" placeholder="CVC">
                    </div>
                </div>
            </div>
        </div>

    </main>

    <!-- Ultra Premium Glassmorphism Action Bar -->
    <div class="fixed bottom-0 w-full glass-panel border-t border-white/40 dark:border-gray-800/60 z-50 rounded-t-3xl shadow-[0_-20px_40px_rgba(0,0,0,0.05)] dark:shadow-[0_-20px_50px_rgba(0,0,0,0.5)] safe-bottom pt-5 px-5 animate-enter delay-300">
        <div class="w-full max-w-lg mx-auto">
            <button class="btn-shimmer w-full flex items-center justify-center gap-2.5 py-4 px-6 rounded-2xl text-white font-extrabold text-[17px] transition-transform active:scale-[0.97] outline-none border border-white/20">
                <svg class="w-5 h-5 text-white/90" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clip-rule="evenodd"></path></svg>
                <span class="tracking-wide">Confirm Payment</span>
                <span class="w-1.5 h-1.5 rounded-full bg-white/50 mx-1"></span>
                <span class="font-mono">৳4,500</span>
            </button>
            <div class="mt-4 flex items-center justify-center gap-4 text-center">
                <span class="text-[10px] font-bold tracking-widest uppercase text-gray-400 dark:text-gray-500 flex items-center gap-1">
                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path></svg>
                    Bank Grade Security
                </span>
            </div>
        </div>
    </div>

    <script>
        // Smooth Accordion Toggle for Details
        function toggleDetails() {
            const panel = document.getElementById('orderDetails');
            const icon = document.getElementById('detailsIcon');
            panel.classList.toggle('open');
            icon.style.transform = panel.classList.contains('open') ? 'rotate(180deg)' : 'rotate(0deg)';
        }

        // Smart Form Switching
        function activateGateway(el, targetId) {
            // UI Update
            document.querySelectorAll('.gw-card').forEach(card => {
                card.classList.remove('active');
                card.querySelector('.check-mark').classList.replace('opacity-100', 'opacity-0');
            });
            el.classList.add('active');
            el.querySelector('.check-mark').classList.replace('opacity-0', 'opacity-100');

            // Form Switching
            document.querySelectorAll('.active-form, .hidden-form').forEach(form => {
                if(form.id === targetId) {
                    form.classList.remove('hidden');
                    // Small delay to allow display:block to apply before animation trick
                    setTimeout(() => { form.style.opacity = '1'; form.style.transform = 'translateY(0)'; }, 10);
                } else {
                    form.classList.add('hidden');
                    form.style.opacity = '0';
                    form.style.transform = 'translateY(10px)';
                }
            });
        }
    </script>
</body>
</html>
