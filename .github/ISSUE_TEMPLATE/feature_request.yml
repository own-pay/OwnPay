name: Feature request
description: Suggest an idea for OwnPay
title: "[FEATURE] "
labels: ["enhancement"]
assignees: []
body:
  - type: textarea
    id: problem
    attributes:
      label: Is your feature request related to a problem?
      description: A clear and concise description of what the problem is. Ex. I'm always frustrated when [...]
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Describe the solution you'd like
      description: A clear and concise description of what you want to happen.
    validations:
      required: true

  - type: dropdown
    id: brand-scope
    attributes:
      label: Brand Scope
      description: Should this apply to all brands or just one?
      options:
        - All Brands (platform-wide)
        - Single Brand
        - Not applicable / Unknown
    validations:
      required: true

  - type: dropdown
    id: user-role
    attributes:
      label: Primary User Role
      description: Who would use this feature?
      options:
        - Platform Admin
        - Brand Staff
        - End Customer (checkout)
        - API Consumer
        - Other
      multiple: true
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: Use Case / Business Value
      description: Why is this important? What workflow does it improve?
      placeholder: e.g. Reduces manual reconciliation for multi-gateway merchants...
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Describe alternatives you've considered
      description: A clear and concise description of any alternative solutions or features you've considered.
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add any other context or screenshots about the feature request here.
    validations:
      required: false
