name: Enterprise Security Audit

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]
  schedule:
    - cron: "0 0 * * 0" # Run weekly on Sundays

jobs:
  security-audit:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: pdo, bcmath, json, curl
          tools: composer:v2, phpstan

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: 🛡️ SCA - Composer Audit
        run: composer audit

      - name: 🛡️ SCA - NPM Audit
        run: npm audit --audit-level=high

      - name: gitleaks
        with:
          fetch-depth: 0
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE}}

      - name: 🔍 SAST - Semgrep
        uses: returntocorp/semgrep-action@v1.161.0
        with:
          config: >-
            p/php p/security-audit p/sql-injection p/xss

      - name: 🧪 Static Analysis - PHPStan
        run: |
          composer install --no-progress --prefer-dist
          phpstan analyze src --level=5 --error-format=github

      - name: 🏛️ Filesystem Vulnerability Scan - Trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          ignore-unfixed: true
          format: "table"
          severity: "HIGH,CRITICAL"
