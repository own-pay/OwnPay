name: Enterprise Security Audit

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main", "dev" ]
  schedule:
    - cron: "0 0 * * 0" # Run weekly on Sundays

permissions:
  contents: read
  security-events: write
  pull-requests: read

jobs:
  security-audit:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: false

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: pdo, bcmath, json, curl
          tools: composer:v2, phpstan

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.x"

      - name: 🛡️ SCA - Composer Audit
        run: composer audit

      - name: 🔑 Secret Scanning - Gitleaks
        uses: gitleaks/gitleaks-action@v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
          
      - name: 🔍 SAST - Semgrep
        run: docker run --rm -v "${{ github.workspace }}:/src" -w /src semgrep/semgrep:1.76.0 semgrep scan --config p/security-audit --config p/secrets

      - name: 🧪 Static Analysis - PHPStan
        run: |
          composer install --no-progress --prefer-dist
          phpstan analyze src --level=5 --error-format=github

      - name: 🏛️ Filesystem Vulnerability Scan - Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: "fs"
          scanners: "vuln,secret,misconfig"
          ignore-unfixed: false
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH,MEDIUM"

      - name: 📤 Upload Trivy Results to GitHub Security Tab
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('trivy-results.sarif') != ''
        with:
          sarif_file: "trivy-results.sarif"
