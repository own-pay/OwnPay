name: Enterprise Security Audit

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main", "dev" ]
  schedule:
    - cron: "0 0 * * 0" # Run weekly on Sundays

permissions:
  contents: read
  security-events: write
  pull-requests: read
  actions: read

jobs:
  security-audit:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: false

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: pdo, bcmath, json, curl
          tools: composer:v2, phpstan

      - name: Cache Composer packages
        id: composer-cache
        uses: actions/cache@v3
        with:
          path: vendor
          key: ${{ runner.os }}-php-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-php-

      - name: Install Dependencies
        run: composer install --prefer-dist --no-progress --dev --optimize-autoloader

      - name: 🛡️ SCA - Composer Audit
        run: composer audit

      - name: 🧪 Static Analysis - PHPStan
        run: vendor/bin/phpstan analyse --level=9 --error-format=github

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.x"
          cache: "npm"

      - name: Install Node Dependencies
        run: npm ci

      - name: 🔑 Secret Scanning - Gitleaks
        uses: gitleaks/gitleaks-action@v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
          
      - name: 🔍 SAST - Semgrep
        run: docker run --rm -v "${{ github.workspace }}:/src" -w /src semgrep/semgrep:1.76.0 semgrep scan --config p/security-audit --config p/secrets

      - name: 🏛️ Filesystem Vulnerability Scan - Trivy (Excluding vendor & node_modules)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: "fs"
          scanners: "vuln,secret,misconfig"
          ignore-unfixed: false
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH,MEDIUM"
          # Exclude vendor and node_modules directories to avoid scanning external third-party dependencies twice
          skip-dirs: "vendor,node_modules"

      - name: Upload Trivy scan results as artifact
        uses: actions/upload-artifact@v4
        with:
          name: trivy-results
          path: trivy-results.sarif